name: actionhead-v1
method: mcts_selfplay
description: "MuZero-style reanalyse with cadence prioritized over single-pass frac:\n\
  frac=0.75, every=2. Tests whether minimizing MAX staleness (not just\naverage refresh\
  \ rate) eliminates drift.\n\nv1 (frac=0.25, every=5): max stale ~8 gens, 5%/gen\
  \ refresh rate\nv2 (frac=0.50, every=5): max stale ~6 gens, 10%/gen refresh rate\n\
  v3 (frac=0.75, every=2): max stale 2 gens, 37.5%/gen refresh rate\n\nRationale:\
  \ initially we considered frac=1.0, every=5 (Option B) but\nthat has max staleness\
  \ 4 gens \u2014 no matter how high you push frac at\ncadence=5, some entries drift\
  \ ~4 gens between refreshes. Cadence is\nthe stronger lever. At every=2, the newest\
  \ 25% is already fresh\n(just-added from current-ish net), so skipping it saves\
  \ compute at\nzero staleness cost, hence frac=0.75 instead of 1.0.\n\nFork point:\
  \ tb-v2 g60, same as v1/v2. Merged main in first (simulator\nfixes, expanded 128-scenario\
  \ eval suite, phase markers). Absolute WR\nwon't be directly comparable to v1/v2's\
  \ due to engine drift, but the\ninternal drift test (does g80 WR hold through g90\
  \ without drop?) is\nstill clean.\n\nShip criterion: g80 AND g90 both >= 74.1% (tb-v2\
  \ g60 peak). If true,\ncadence-driven staleness reduction DID close the drift loop\
  \ and this\nis our drift-free config.\nKill criterion: g90 drifts from g80 peak\
  \ by >=1pp despite max\nstaleness = 2 gens. Staleness alone isn't the bottleneck\
  \ \u2014 the\nremaining drift lives in the value-head bias, not the buffer.\n\n\
  Compute cost: ~3.75x v2 (37.5K states \xD7 1/2 gens = 18.75K states/gen\nrefreshed\
  \ vs v2's 25K \xD7 1/5 = 5K). Expect ~16 min/gen, ~27 hours for\n100 gens.\n"
