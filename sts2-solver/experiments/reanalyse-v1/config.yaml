name: reanalyse-v1
method: mcts_selfplay
description: |
  MuZero-style reanalyse: every 5 gens, re-run MCTS on 25% of the oldest
  buffer entries with the current network and overwrite their (policy,
  value) targets. Tests whether the post-gen-60 drift seen in tb-v2 is
  caused by the critic fitting increasingly stale bootstrap targets.

  Trunk-v1 config otherwise (POMCP 1000 sims, pwfix, qtarget, mcts_bootstrap,
  turn_boundary_eval), value_head_layers=3. Cold-start, 100 gens, save_every=1,
  eval_every=1 for dense trajectory analysis.

  Ship criterion: benchmark WR at gen 80 holds vs gen 60 peak (no drift).
  Kill criterion: WR drifts like tb-v2 despite reanalyse → stale-target
  hypothesis falsified, drift is inherent to T(V_θ) even with fresh targets.

  See PLAN.md for mechanism, signals, follow-up experiments.
