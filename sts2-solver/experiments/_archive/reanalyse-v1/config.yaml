name: reanalyse-v1
method: mcts_selfplay
description: "MuZero-style reanalyse: every 5 gens, re-run MCTS on 25% of the oldest\n\
  buffer entries with the current network and overwrite their (policy,\nvalue) targets.\
  \ Tests whether the post-gen-60 drift seen in tb-v2 is\ncaused by the critic fitting\
  \ increasingly stale bootstrap targets.\n\nForked from trunk-baseline-v2 gen 60:\
  \ tb-v2 showed no drift before gen 60,\nso forking at that point gives a tight apples-to-apples\
  \ A/B \u2014 same starting\nweights, only variable is reanalyse. tb-v2's continued\
  \ training past gen 60\nis the negative control (monotonic WR decline 74.1% \u2192\
  \ 71.9% gen 60\u219290);\nreanalyse-v1 training the same gen range is the intervention\
  \ arm.\n\nTrunk-v1 config (POMCP 1000 sims, pwfix, qtarget, mcts_bootstrap,\nturn_boundary_eval),\
  \ value_head_layers=3. save_every=1, eval_every=1 for\ndense trajectory analysis.\
  \ Target gen range: 61 -> 100.\n\nShip criterion: benchmark WR at gen 80/90 holds\
  \ vs tb-v2 gen 60 peak (74.1%)\ninstead of drifting to tb-v2's 71.9% at gen 90.\n\
  Kill criterion: WR drifts like tb-v2 despite reanalyse -> stale-target\nhypothesis\
  \ falsified, drift is inherent to T(V_\u03B8) even with fresh targets.\n\nSee PLAN.md\
  \ for mechanism, signals, follow-up experiments.\n"
