concluded_gen: 80
concluded_reason: "First reanalyse experiment. frac=0.25, every=5 (5%/gen refresh).\
  \ Forked from tb-v2 g60 (74.1%), reached 73.8% [71.8, 75.7] at gen 80 on lean-decks-v1\
  \ (n=1890, +1.6pp over tb-v2 g80 at 72.2% but p=0.339, not significant at this n).\
  \ Confirmed reanalyse mechanism slows drift but doesn't eliminate it \u2014 g90\
  \ dropped to 72.9%, showing staleness leaks through at low refresh rate. Superseded\
  \ by reanalyse-v2 (frac=0.5) which hit 75.0% at g80 (p=0.022 significant). Kept\
  \ for 3-point curve in refresh-rate sweep."
