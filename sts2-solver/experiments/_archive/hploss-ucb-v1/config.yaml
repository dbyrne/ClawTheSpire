name: hploss-ucb-v1
method: mcts_selfplay
description: "HP head + UCB consumes it. Follow-up to hploss-aux-v1 which showed\n\
  training-only HP supervision is insufficient \u2014 MCTS still needs HP\nin its\
  \ search objective for decision quality to transfer.\n\nThesis (from project_hploss_aux_v1_result.md\
  \ + 2026-04-19 design\ndiscussion): win rate is a compressed signal; HP loss per\
  \ decision\ncarries more bits of information about play quality. Value head\nwith\
  \ pure \xB11 targets (hploss-aux-v1 design) gives clean training\ngradient, but\
  \ dropping HP from MCTS UCB removes HP-awareness from\nsearch \u2192 policy targets\
  \ lose HP steering \u2192 P-Eval regressed 7pt.\n\nArchitecture (same as hploss-aux-v1):\n\
  \  - value head: pure win/loss targets (\xB11), terminal_scale (1,0,-1)\n  - hp\
  \ head: HP-loss fraction [0,1], sigmoid output, ~9K params\n  - trunk: 128 hidden,\
  \ value_head_layers=3\n  - total: ~149K params\n\nNEW vs hploss-aux-v1:\n  - MCTS\
  \ UCB now uses V_mean + hp_ucb_mu \xD7 (1 \u2212 HP_mean)\n  - hp_ucb_mu = 1.0 \u2192\
  \ HP weighted equal to V at MCTS selection\n  - This is the \"Option 2 done right\"\
  \ design: each head has clean\n    training signal, AND HP is a first-class inference\
  \ signal.\n\nSingle-knob delta from hploss-aux-v1: \u03BC flips from 0 \u2192 1.0.\n\
  Cold-start from trunk-baseline-post-sim-fix codebase (via fork off\nexperiment/hploss-aux-v1,\
  \ then cold training).\n\nShip criteria:\n  1. V-Eval > 102/121 (hploss-aux-v1 plateau)\
  \ \u2192 preferably > 108\n  2. P-Eval \u2265 70/83 (trunk-baseline-v1 parity, recovering\
  \ hploss-aux's 7pt drop)\n  3. conditional_value holds \u226517/20 (hploss-aux-v1's\
  \ headroom gain)\n  4. |g_H| / |g_V| ratio comparable to hploss-aux-v1\n  5. grad_cos_vh\
  \ stays < 0.6 (heads don't collapse into parrots)\n"
created: '2026-04-19T11:45:23+00:00'
