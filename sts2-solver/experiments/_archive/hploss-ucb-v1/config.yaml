concluded_gen: 60
concluded_reason: "Experiment falsified: MCTS UCB consuming HP head at mu=1.0 produced\
  \ monotonic P-Eval decline across training (96 at gen 10 -> 89 at gen 60, -7 scenarios\
  \ over 50 gens) while V-Eval oscillated (102,103,97,101,90,95). Finalized gen 60\
  \ because no gen is 'good' \u2014 even gen 10's peak was worse than trunk-baseline-v1\
  \ gen 60. mu=1.0 too aggressive: HP-in-UCB drives policy into restrictive basins.\
  \ Future hp_ucb_mu experiments should try 0.3-0.5 (trunk-effective range)."
concluded_at: '2026-04-19T15:35:04+00:00'
