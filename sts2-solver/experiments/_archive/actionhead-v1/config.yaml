concluded_reason: "PARTIAL SUCCESS / NET NEGATIVE: option \u03B2 (permanent A-additive\
  \ in UCB) at \u03BB=0.5 broke the echo chamber but degraded policy quality enough\
  \ to net-regress vs v3. At gen 33 peak: P-Eval 98 (vs v3's 112), V-Eval 108 (vs\
  \ 100), combat_eval_mcts CLEAN 90 / ECHO 0 / FIXED 8 / BROKE 2 / MIXED 26, rescue\
  \ rate 60% (vs v3's 50%). Last-10-gen windowed averages: ECHO 0 (climbed down from\
  \ 2.3 in first 10 gens), FIXED 7.2 (up from 3.7), rescue 52.6% (up from 44.5%),\
  \ but CLEAN 88 (down from 100.9), MIXED 28.6 (up from 18.4), BROKE 2.2 (up from\
  \ 0.7). Ship criteria: ECHO \u2264 1 \u2713, rescue \u2265 70% \u2717 (only 52.6%),\
  \ combined eval \u2265 baseline \u2717 (losing 13 scenarios on CLEAN+FIXED sum).\
  \ The hypothesis \u2014 per-action A signal helps MCTS rescue policy errors \u2014\
  \ is CONFIRMED (ECHO 3\u21920, FIXED doubled). But \u03B2-mode's permanent UCB addition\
  \ has too large a blast radius: A perturbs selection on correct-policy scenarios\
  \ too, causing CLEAN drops and BROKE tripling. The 'bonus rescues' don't fully compensate\
  \ for the 'lost CLEANs'. Two follow-ups: lambda03 (smaller \u03BB to reduce perturbation)\
  \ still climbing at gen 12-14, and actionhead-alpha (option \u03B1, A only for first\
  \ visit, auto-correcting) showing much better CLEAN preservation (102 vs 88) with\
  \ rescue climbing toward 50%. \u03B1 is the hypothesis-test-with-less-damage direction.\
  \ Finalize v1 at gen 33 (peak rescue 60%); free compute for \u03B1 to mature. A-head\
  \ training itself was never the issue (pred \u2248 target throughout) \u2014 UCB\
  \ integration strategy is the key variable."
