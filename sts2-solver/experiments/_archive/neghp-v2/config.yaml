concluded_reason: "FAILED (second attempt): continuous HP-delta reward re-tested with\
  \ proper V-head warm-load (vhl=3, fork bug fixed). Original neghp-v1 'V-Eval collapse'\
  \ was an artifact of vhl-reset, but the OTHER failure modes are real: at 22 post-fork\
  \ gens, combat_eval_mcts ECHO=6 (vs v3's 3), FIXED=1, rescue rate 14% (vs v3's 50%),\
  \ survival_rate plateaued at 30-35% (vs v3's ~75% WR). P-Eval held 100-109 (vs v3's\
  \ 112) but V-Eval oscillated wildly 80-106, failing to stabilize. The continuous-reward\
  \ scheme does NOT break the echo chamber even with proper warm-start \u2014 the\
  \ hypothesis was wrong. Validates our original pivot from neghp to actionhead: smoothing\
  \ V(s) targets doesn't fix per-action discrimination. Finalize gen 98 reflects post-oscillation\
  \ peak (P 109, V 101). Implications: (1) V-head signal smoothness is not the bottleneck\
  \ for echo-chamber; (2) per-action signal (H1, actionhead) remains the principled\
  \ next direction; (3) combat continuing past HP=0 is simulable correctly but offers\
  \ no training-signal advantage on top of the existing win/loss discontinuity."
