name: trunk-192-v1
method: mcts_selfplay
description: "Trunk capacity bump: hidden_dim 128 -> 192 on current main arch\n(handagg-lean\
  \ base, no per-target or aggregate enemy dims). Cold-start,\n60 gens, POMCP+pwfix+qtarget+mcts_bootstrap\
  \ regime matching the recent\nstable config. First experiment with gradient-conflict\
  \ telemetry from\ngen 1 (grad_cos_pv, norms logged every 10th batch).\n\nStrategic\
  \ hypothesis: push/pull between P-Eval and V-Eval across recent\narch experiments\
  \ (enemy-intent, enemy-powers) may be trunk-capacity\ncontention \u2014 shared 128-dim\
  \ trunk too narrow for both heads. More\ncapacity should relieve contention and\
  \ let V-Eval break past the ~105\nceiling lean hit.\n\nRead:\n  - Ship if V-Eval\
  \ >= 108 AND P-Eval >= lean's 81% AND cos(g_P,g_V) moves\n    toward +1 as capacity\
  \ increases (confirms contention relief).\n  - If V-Eval breaks ceiling but cos\
  \ stays low: capacity helped via\n    different mechanism (likely value-head expressiveness),\
  \ not contention.\n  - If V-Eval stays ~105 but cos goes positive: capacity fixed\n\
  \    interference but bottleneck is elsewhere (value-head width next).\n  - If V-Eval\
  \ flat and cos stays low: capacity isn't the lever; pivot\n    to split-trunk or\
  \ richer value supervision.\n"
