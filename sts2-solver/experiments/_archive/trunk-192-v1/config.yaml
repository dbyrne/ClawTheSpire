concluded_reason: 'Capacity hypothesis disconfirmed. HIDDEN_DIM 128->192 cold-start
  on pre-sim-fix main. At gen 30 V-Eval = 93/121 (matches powers-v1, -13 vs lean''s
  106). Gen 20 was a favorable sample (V=98, compound_scaling hit 26/26 ceiling);
  gen 30 regressed to mean. Gradient telemetry was the real finding: cos(g_P, g_V)
  ~ 0 (no trunk contention, heads aren''t fighting) and |g_V| ~ 5-10x |g_P| (value
  dominates trunk). Interpretation: capacity alone isn''t the lever; value head is
  the bottleneck. Pivoting to wider-value-head experiment (valuewide-v1) with HIDDEN_DIM=128
  on fixed sim + per-enemy encoding.'
