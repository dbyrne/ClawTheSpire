description: "trunk-baseline-v1 continuation (warm-start from gen 60 -> target gen\
  \ 100).\n\nTests the \"maybe 60 gens is too short\" hypothesis surfaced 2026-04-19:\n\
  trunk-baseline-v1 P-Eval trajectory on the expanded 125-scenario suite\nwas 89 ->\
  \ 91 -> 94 -> 96 -> 101 -> 102 across gens 10..60 \u2014 still\nclimbing at the\
  \ 60-gen cutoff rather than plateauing. Extending to 100\ngens should reveal whether\
  \ there's 5-10 more scenarios of policy\nimprovement on the table for this architecture.\n\
  \nSame architecture, config, and encounter set as trunk-baseline-v1.\nWarm-start\
  \ from trunk-baseline-v1 gen 60 checkpoint \u2014 continuation,\nnot a fresh run.\
  \ All training + inference knobs identical to v1.\nThe expanded 125-scenario P-Eval\
  \ suite will auto-run every 10 gens\nvia eval_every=10.\n"
