concluded_reason: "Informative failure: warm-start on new distribution without compute\
  \ scaling. Forked from v3 g88 on uber-decks-v1 (4x larger distribution: 795 vs 189\
  \ encounters) with v3's original config (combats=256, buffer=50K, epochs=4). Trained\
  \ 15 gens post-fork before killed. Combat WR on uber-decks-v1 = 67.3% [65.8, 68.8]\
  \ n=3975, statistically tied with v3 g88's 67.7% baseline (p=0.70). Meanwhile P-Eval\
  \ dropped 83.6% -> 78.1% (-5.5pp), combo category regressed 12/14 -> 9/14, and combat_eval_mcts\
  \ showed 10 scenarios migrate CLEAN (105->95) -> MIXED (14->25). Net became less\
  \ decisive, not wrong \u2014 classic forgetting pattern. Root cause identified (see\
  \ feedback_distribution_scaling): per-encounter gradient attention was 4x thinner\
  \ than v3's equivalent (1050 -> 252 grads/enc/gen) while v3's fixed-point was actively\
  \ decaying due to weight drift. Reanalyse aggressive refresh locked in the mid-transition\
  \ state. v5 tests the under-training hypothesis with proportionally scaled config\
  \ (combats 1024, buffer 200K)."
