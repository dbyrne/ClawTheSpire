name: reanalyse-v4
method: mcts_selfplay
description: "Warm-start from reanalyse-v3 g88 (the shipped combat-net baseline),\
  \ train\non uber-decks-v1 (676 encounter set covering all eval-tested cards at\n\
  higher coverage than lean-decks-v1). Same v3 reanalyse config\n(frac=0.75, every=2,\
  \ max staleness 2 gens).\n\nTests whether the v3 config's strengths hold on a broader\
  \ training\ndistribution, and specifically whether the failing combo-sequencing\n\
  evals (BURST ordering, CALCULATED_GAMBLE sequencing, DODGE_AND_ROLL\nkeep/discard)\
  \ improve when the training distribution actually contains\nthese cards at reasonable\
  \ frequency.\n\nv3 at g88 on lean-decks-v1: P-Eval 87.5%, V-Eval 82.6%, combat WR\
  \ 74.8%,\nrescue rate 50%. Failing evals were all training-distribution gaps\n(DODGE_AND_ROLL\
  \ in 0.5% of decks, BURST in 17%). uber-decks-v1 bumps\nthese to DODGE_AND_ROLL\
  \ ~14% (post-topup), BURST ~25%, FINISHER 17%,\netc. All eval-referenced cards are\
  \ now represented at >= 10%.\n\nShip criterion: P-Eval combo category improves from\
  \ 11/14 (v3) to 13+.\nSecondary: overall P-Eval maintains or exceeds v3's 87.5%\
  \ despite\ntraining on a different distribution.\nKill criterion: P-Eval drops below\
  \ v3's baseline OR combo category\ndoesn't improve \u2014 either means training-distribution\
  \ gap wasn't the\nbottleneck and we need to look elsewhere (architecture, value-head\
  \ bias).\n\nConfig merged with latest main (sim fixes, uber-decks tooling, phase\n\
  markers). 100 gens warm-started, ~12-15 min/gen wall-clock.\n"
