name: reanalyse-v5
method: mcts_selfplay
description: "Warm-start from reanalyse-v3 g88 on uber-decks-v1, but with compute\n\
  proportionally scaled to the 4x larger training distribution.\n\nMotivation: reanalyse-v4\
  \ warm-started same weights on uber-decks-v1 with\nv3's original config (combats=256,\
  \ buffer=50K, epochs=4). Result at gen\n103: combat WR tied v3 g88 (67.3% vs 67.7%\
  \ on uber-decks), P-Eval dropped\n5.5pp, combo category regressed, and combat_eval_mcts\
  \ showed CLEAN->MIXED\nmigration (105->95 CLEAN, 14->25 MIXED). Classic forgetting\
  \ pattern.\n\nThe under-training hypothesis: v3 trained 28 gens on 189 encounters\
  \ to\nreach convergence, implying ~1050 gradient-passes per encounter per gen.\n\
  v4 with 256 combats on 795 encounters gave only ~252 per-encounter grads\nper gen\
  \ (4x less) while actively unlearning v3's lean-decks sharpness.\nv4 at 15 gens\
  \ post-fork was ~12% of v3's proportional training budget.\n\nv5 scales proportionally:\n\
  \  combats_per_gen:   256  -> 1024   (4x: same per-encounter sampling rate)\n  replay_capacity:\
  \   50K  -> 200K   (4x: same per-encounter buffer coverage)\n  train_epochs:   \
  \   4    -> 4      (unchanged: 4x larger buffer already\n                      \
  \               gives 4x more batches per epoch)\n  lr:                3e-4    \
  \        (same)\n  reanalyse:         frac=0.75 every=2  (same as v3; max staleness\
  \ 2 gens)\n\nNet effect: per-encounter gradient attention matches v3 (~1050\nupdates/enc/gen).\
  \ Wall-clock 3-4x v3 due to 4x self-play and 4x reanalyse\n(same frac on 4x buffer).\
  \ Expected ~40-50 min/gen.\n\nFork point: v3 g88 (same as v4 for comparability).\
  \ 100 gens post-fork\n(89 -> 188).\n\nShip criterion: WR on uber-decks-v1 > 72%\
  \ (5pp above v3 g88 baseline of\n67.7%) AND P-Eval >= 85% (no worse than v4's 80%-ish\
  \ range). Demonstrates\nuber-decks training is feasible with right compute scaling.\n\
  Kill criterion: P-Eval drops below 75% OR uber-decks WR fails to beat\nv3 g88 baseline\
  \ after 40 gens post-fork. Would falsify the under-training\nhypothesis \u2014 something\
  \ else is wrong with warm-start + distribution shift.\n"
