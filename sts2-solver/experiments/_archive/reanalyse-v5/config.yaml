concluded_reason: "FAILED: warm-start on uber-decks-v1 with 4x compute scaling still\
  \ regressed from v3 g88 baseline. Peak at g95 (P-Eval 109/128 85.2%, V-Eval 104/121\
  \ 86.0%) matched v3 g88 on V-Eval but didn't exceed P-Eval; by g100 both dropped\
  \ (P 102/128, V 99/121). combat_eval_mcts rescue rate collapsed from v3's 57% to\
  \ 33% \u2014 value head lost calibration on OOD scenarios. Primary failure mode:\
  \ signal dilution. Net reverted to 'play STRIKE' default on draw-sequencing scenarios\
  \ (draw category 10/10 -> 6/10) because uber's broader distribution re-weighted\
  \ STRIKE-wins over lean's fine 'draw-first' patterns. Failing scenarios use cards\
  \ already in lean (ACROBATICS, BACKFLIP, ADRENALINE, ESCAPE_PLAN, CALCULATED_GAMBLE),\
  \ so data coverage was not the gap \u2014 training dynamics was. Additional issue:\
  \ reanalyse_min_gen=99 delayed refresh until gens 89-98 had already drifted; when\
  \ reanalyse activated at g99, it locked in the drifted state (value_loss jumped\
  \ 0.056->0.082, value_corr dropped 0.92->0.88 over g100->g101). v4's always-on reanalyse\
  \ (from g90) produced smoother convergence despite thinner per-encounter attention.\
  \ Lesson: compute scaling alone insufficient; new training distribution on warm-start\
  \ needs an explicit anchor (mixed distribution, KL-distillation) to preserve parent's\
  \ skill. Use reanalyse from fork point, not delayed."
concluded_at: '2026-04-20T21:12:34+00:00'
