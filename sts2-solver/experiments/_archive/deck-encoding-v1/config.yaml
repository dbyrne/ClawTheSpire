name: deck-encoding-v1
method: mcts_selfplay
description: |
  Adds deck-composition aggregates (draw + discard pile × 6 scalars each +
  hand count_trash) to state encoding. Tests hypothesis that the V-Eval
  oscillation and critic over-specialization we saw in trunk-baseline-v2
  (93-111 band across gens 60-90 while telemetry converged) is caused by
  the encoding lacking pile-contents info the network needs for decisions
  like Backflip EV, Calculated Gamble value, and cycle-timing.

  13 new base-state dims: hand count_trash (+1), draw_agg (+6), discard_agg (+6).
  BASE_STATE_DIM 156 -> 169. STATE_DIM 446 -> 459. ~1.7K extra params at
  first trunk Linear.

  Same training config as trunk-baseline-v1 canonical lineage — POMCP 1000
  sims, pwfix, qtarget, mcts_bootstrap, turn_boundary_eval. 100 gens cold-
  start (state_dim changes prevent warm-loading). save_every=1 + eval_every=1
  for dense trajectory analysis.

  See PLAN.md for hypothesis, ship criteria, kill criteria.
created: '2026-04-19T17:54:40+00:00'
parent: null
parent_checkpoint: null
network_type: betaone
architecture:
  arch_version: 2
  hidden_dim: 128
  action_hidden: 64
  hand_proj_dim: 32
  card_embed_dim: 16
  card_stats_dim: 28
  relic_dim: 27
  hand_agg_dim: 4
  pile_agg_dim: 6
  num_piles: 2
  action_dim: 35
  max_hand: 10
  max_actions: 30
  value_head_layers: 3
  num_cards: 578
  total_params: 142451
  base_state_dim: 169
  state_dim: 459
  trunk_input: 201
