name: ucb-reanalyse-v1
method: mcts_selfplay
description: "2x2 combination experiment: UCB-HP action selection (mu=1.0) in MCTS\n\
  plus MuZero-style reanalyse (50% every 4 gens, aligned to buffer turnover).\n\n\
  Tests whether ucb-v1's monotonic P-Eval decline (96->89 over 50 gens at\nmu=1.0)\
  \ was caused by:\n(a) UCB-HP visits being intrinsically worse targets -> reanalyse\
  \ won't save it\n(b) UCB-HP visits slightly off, stale targets amplifying the drift\
  \ ->\n    reanalyse breaks the compounding\n\nCold start (no carryover from aux-v1\
  \ or ucb-v1 \u2014 HP head + policy +\nvalue co-evolve under the combined regime).\
  \ 100 gens on lean-decks-v1.\n\nCadence rationale: buffer holds 50K steps / ~6.5K\
  \ per gen ~= 7.7 gens\nto full FIFO turnover. 50% every 4 gens refreshes each entry\
  \ at ~52%\nof its natural lifetime (before eviction takes it). Tighter than\nreanalyse-v1\
  \ (25%/5 = 5%/gen leak) or reanalyse-v2 (50%/5 = 10%/gen).\n\nreanalyse_min_gen:\
  \ 20 to let the HP head build structure before\nreanalyse uses its predictions to\
  \ refresh targets (otherwise early\nreanalyse uses random-HP-head outputs as signal).\n\
  \nShip criterion: P-Eval doesn't monotonically decline (vs ucb-v1's 96->89).\nSecondary:\
  \ benchmark WR at gen 80/90 retains tb-v2 g60 peak (74.1%) like\nreanalyse-v1 did.\n\
  Kill criterion: same decline as ucb-v1 -> UCB-HP is intrinsically\ndestabilizing,\
  \ independent of staleness.\n"
