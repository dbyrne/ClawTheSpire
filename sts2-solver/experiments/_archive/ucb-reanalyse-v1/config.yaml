concluded_reason: "UCB-HP + reanalyse experiment \u2014 informative failure. Cold-start,\
  \ HP head, UCB mu=1.0, reanalyse frac=0.5 every=4. Hit P-Eval peak 71.9% at g41\
  \ and V-Eval peak 90.9% at g50, then V-Eval went volatile in late gens (down to\
  \ 59.5% at g95). Final gen 100 P-Eval 67.2%, V-Eval 81.0%. Pinned at g50 to preserve\
  \ the trained HP head as a reusable asset. combat_eval_mcts at g50 shows FIXED=0\
  \ at both mu=0 and mu=1.0, with BROKE=2 at mu=1.0 \u2014 UCB-HP does not help rescue\
  \ rate at inference and actively breaks correct decisions at mu=1.0. Combined with\
  \ earlier 2x3 sweep showing mu=0.3/0.5 is no-op at inference, UCB-HP as a mechanism\
  \ is a dead end at every mu value tested. HP head itself trained fine (H-Eval ~70%)\
  \ and may have value for future interventions that are not UCB-based (e.g., distillation,\
  \ aux loss with stronger weight). Contrast with v3 (pure reanalyse, aggressive refresh):\
  \ v3 g88 has 50% rescue rate, 87.5% P-Eval, stable V-Eval through g100."
concluded_at: '2026-04-20T12:27:52+00:00'
