name: valuewide-v1
method: mcts_selfplay
description: "Wider value head. HIDDEN_DIM=128 (unchanged); value head goes from\n\
  128 -> 256 -> 128 -> 64 -> 1 (~74K params) to 128 -> 512 -> 256 -> 128 -> 1\n(~230K\
  \ params) \u2014 2x scaling at the widest layers. Cold-start, 60 gens.\n\nPivot\
  \ from trunk-192-v1's finding: capacity bump on shared trunk didn't\nunlock V-Eval\
  \ past lean's ~105 ceiling. Gradient telemetry showed\ncos(g_P, g_V) ~ 0 (no head-vs-head\
  \ conflict) AND |g_V| dominates\n|g_P| by 5-10x throughout training. Interpretation:\
  \ value head is the\ntrunk's primary consumer, but its own downstream capacity is\
  \ the\nbottleneck \u2014 not the shared trunk width. This experiment tests that\n\
  directly by giving value head 2x width with the trunk unchanged.\n\nRuns on fixed\
  \ sim (commits d4d6132 + b092087: Intangible implemented\neverywhere, Plating semantics\
  \ correct, per-enemy Intangible/Plating/\nArtifact encoded) AND new BASE_STATE_DIM=155.\
  \ So V-Eval numbers will\nbe on the canonical corrected baseline, not directly comparable\
  \ to\ntrunk-192 (pre-fix) \u2014 but comparable to lean's trajectory modulo the\n\
  encoding+sim-fix delta.\n\nGradient-conflict telemetry on (grad_conflict_sample_every=10).\
  \ Watch:\n  - V-Eval trajectory vs lean: does it break past 105?\n  - compound_scaling\
  \ + conditional_value: do they saturate ceiling\n    EARLIER than lean did (i.e.,\
  \ gen 20 vs lean's gen 30)?\n  - |g_V| / |g_P| ratio: does wider value head reduce\
  \ |g_V| magnitude\n    per shared-trunk param (head has more params absorbing the\
  \ signal)?\n  - cos: expected to stay ~0; if it moves, that's a surprise.\n\nShip\
  \ criteria (stricter than trunk-192):\n  1. V-Eval breaks 108/121 (clear ceiling\
  \ break, not within noise)\n  2. compound_scaling holds 25+/26 across 2+ eval gens\
  \ (stability)\n  3. conditional_value holds 17+/20 across 2+ eval gens\n  4. No\
  \ P-Eval regression below lean's 80% (80-equiv)\n\nDon't ship if:\n  - V-Eval plateaus\
  \ 100-105 (same ceiling as lean)\n  - V gains in one category offset by equal losses\
  \ in another\n    (net within-noise even if categories shift)\n\nIf this plateaus\
  \ at lean's ceiling, the remaining lever is training\nsignal quality (richer value\
  \ supervision: TD-lambda, multi-step, etc.),\nnot arch capacity anywhere.\n"
