concluded_reason: "Wider value head (128->512->256->128->1, 231K head params, 297K\
  \ total) on fixed sim + per-enemy encoding. Cold-start, killed at gen 33/60. Disconfirmed\
  \ value-head-internal-capacity hypothesis. Trajectory showed CLEAR OVERFITTING:\
  \ P-Eval 79.5%->75.9%->72.3% gen 10/20/30, V-Eval 81->80->74 \u2014 both monotonic\
  \ regression while v_loss kept dropping (0.07->0.04->0.028). compound_scaling crashed\
  \ from 26/26 ceiling at gen 10 to 16/26 at gen 30. Gradient telemetry unchanged\
  \ from trunk-192: cos~0, |gV| 5-10x |gP|. Conclusion combined with trunk-192: NEITHER\
  \ trunk capacity NOR value-head expressiveness is the bottleneck. Finalized at gen\
  \ 10 (V-Eval peak before overfitting set in)."
