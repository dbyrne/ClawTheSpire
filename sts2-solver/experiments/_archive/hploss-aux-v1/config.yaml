name: hploss-aux-v1
method: mcts_selfplay
description: "Auxiliary HP-loss prediction head + value reward stripped to pure\n\
  win/loss. Pivot from trunk-192 + valuewide dual-null result (see\nproject_capacity_dual_null.md\
  \ memory).\n\nArchitecture: third network head alongside policy + value, predicting\n\
  normalized HP loss to combat end. ~9K head params, 128 -> 64 -> 1\nwith sigmoid\
  \ output. Reads only trunk h, NOT action features (HP\nloss is state-level). Total\
  \ network ~147K params.\n\nTarget: (hp_at_state - max(hp_at_end, 0)) / max(hp_at_state,\
  \ 1).\nNaturally bounded [0, 1]. Loss case = 1.0. Normalized by hp_at_state\n(current\
  \ HP at predicted state) \u2014 chosen over max_hp (varies via\nrelics/events) and\
  \ starting_hp (not in state encoding).\n\nReward strip: terminal_value_scaled changes\
  \ from (1.0, 0.3, -1.0) to\n(1.0, 0.0, -1.0). Pure binary win/loss for value head.\n\
  \nMCTS bootstrap: each node tracks hp_loss_sum alongside value_sum.\nMixed with\
  \ actual rollout HP loss via hp_target_mix=0.5.\n\nLoss: total = policy + value_coef\
  \ * value_mse + hp_coef * hp_mse.\nhp_coef=1.0 starting; tune via |g_HP| telemetry.\n\
  \nHP head is TRAINING-ONLY. MCTS UCB unchanged.\n\nCold-start, 60 gens, POMCP+pwfix+qtarget+mcts_bootstrap.\
  \ On fixed\nsim + per-enemy encoding + PENDULUM.\n\nShip criteria:\n  1. V-Eval\
  \ breaks 110/121 (clear ceiling break vs lean's 105-110)\n  2. compound_scaling\
  \ stable at 25+/26\n  3. conditional_value crosses 18/20\n  4. P-Eval at lean parity\
  \ or better (80%+)\n  5. |g_HP| telemetry shows aux head genuinely contributing\n"
