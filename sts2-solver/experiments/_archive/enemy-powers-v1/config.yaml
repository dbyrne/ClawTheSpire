name: enemy-powers-v1
method: mcts_selfplay
description: "Per-enemy power encoding (3 new dims per enemy slot: Artifact/3, Plated\
  \ Armor/10, Intangible/3) \u2014 promotes currently-unencoded enemy powers into\
  \ the per-enemy block so both value and policy heads can condition on them per-target.\
  \ Cold-start, value_head_layers=3. POMCP+pwfix+qtarget+mcts_bootstrap matching the\
  \ stable regime. 40 gens, eval_every=10, 1000 sims. Baseline handagg-seq-v1 gen30.\
  \ Ship if new per-target P-Eval scenarios (neutralize/attack_skip_artifact/intangible/\
  \ plated) lift AND no general regression. Orthogonal to enemy-intent-v1 (aggregate\
  \ features)."
