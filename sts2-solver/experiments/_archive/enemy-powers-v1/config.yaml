concluded_reason: "Per-enemy power encoding (+15 dims for Artifact/Plating/Intangible\
  \ per enemy slot) + Cold-start, 50 gens trained on PRE-SIM-FIX main. Per-target\
  \ ship criterion failed (targeting 0/3 across all 5 evals, attributable mostly to\
  \ sim bugs we later fixed: Plated-Armor-name-mismatch and Intangible-not-applied).\
  \ General eval climbed monotonically: P-Eval 75.9%->85.0%, V-Eval 65%->88% (gen\
  \ 10->50). Gen 50 V-Eval 106/121 - tied with lean's gen 38 finalized result. Combined\
  \ eval within noise of lean \u2014 simpler-arch-wins applies, do not ship. Encoding-merge\
  \ has been adopted to main as part of d4d6132 anyway, so the per-enemy dims live\
  \ forward independently. Finalized at gen 50 (V-Eval peak, trajectory still positive)."
