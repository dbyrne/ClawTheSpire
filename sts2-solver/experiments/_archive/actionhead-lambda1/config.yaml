concluded_reason: "FAILED: \u03BB=1.0 on A-head-in-UCB actively WORSENED echo chamber.\
  \ At 23 post-fork gens, combat_eval_mcts ECHO=7 (vs v3's 3), FIXED=1, rescue rate\
  \ 13% (vs v3's 50%). P-Eval plateau 94-106 (vs v3's 112), V-Eval oscillating 85-108.\
  \ A-head trained cleanly (pred tracks target to ~98%) so the head itself isn't the\
  \ problem \u2014 strong lambda lets A's residual noise dominate over correct Q-backups\
  \ on scenarios where A happens to be wrong. Counterintuitive finding vs hypothesis:\
  \ MORE lambda = WORSE rescue. Sweet spot for A-in-UCB (if any) is \u22640.5. Finalize\
  \ gen 2 reflects first-meaningful-training gen (P 110, V 105) after the gen-1 cold-A\
  \ noise baseline. Direct implication: option \u03B2 (permanent UCB additive) with\
  \ large \u03BB is a dead end; consider option \u03B1 (only initial Q) or smaller\
  \ \u03BB (0.2-0.3) instead."
