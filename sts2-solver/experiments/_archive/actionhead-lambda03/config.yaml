concluded_reason: "FAILED: \u03BB=0.3 with option \u03B2 (permanent UCB additive)\
  \ is strictly dominated by v3 baseline. At 19 post-fork gens, combat_eval_mcts shows\
  \ the weak-\u03B2 regime as worst-of-both-worlds: CLEAN 95 vs v3's 105 (-10), ECHO\
  \ 2.4 vs 3 (tie), FIXED 5.2 vs 3 (+2), BROKE 2.6 vs 1 (+1.6 worse), MIXED 20.8 vs\
  \ 14 (+7 more hedging), rescue rate 24% vs 50% (-26pp!). P-Eval plateau 97-107 (below\
  \ v3's 112), V-Eval oscillating 87-105. Smaller \u03BB attenuates A's UCB contribution\
  \ but doesn't avoid the BROKE-increase side effect (A still perturbs correct policy\
  \ picks on expand, just less aggressively), AND fails to net-benefit from the FIXED-increase\
  \ (search can't commit enough to overcome noisy Q backups). The hypothesis 'smaller\
  \ \u03BB preserves CLEAN while still breaking echoes' is falsified: CLEAN is NOT\
  \ preserved (-10), echoes are NOT broken (ECHO ties v3), rescue rate collapses.\
  \ Confirms actionhead-v1's finding that \u03B2-mode integration is fundamentally\
  \ a Pareto-worse tradeoff vs v3 \u2014 you pay policy quality for rescue capacity,\
  \ and at \u03BB=0.3 you pay without receiving. Alpha variant (\u03B1 mode, \u03BB\
  =0.5) at gen 19 has CLEAN 101 (near-v3) and rescue 37% \u2014 Pareto-similar to\
  \ v3, not clearly dominated but not clearly winning either. Finalize gen 9 as peak\
  \ within the stable post-init plateau (P 107, V 100)."
