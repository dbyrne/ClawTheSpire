name: reanalyse-v2
method: mcts_selfplay
description: 'MuZero-style reanalyse with aggressive refresh: frac=0.5 every 5 gens

  (2x reanalyse-v1''s 0.25). Tests whether the gap-closing pattern in

  reanalyse-v1 (+1.6pp at g80 vs +1.0pp at g90 vs tb-v2) was caused by

  an undersized refresh rate letting staleness leak through at long

  horizons.


  Same fork point as reanalyse-v1: trunk-baseline-v2 gen 60. Same

  architecture, config, and encounter set. Only difference is

  reanalyse_frac: 0.25 -> 0.5.


  reanalyse-v1 already showed the combat-WR side of drift is mitigated

  by target refresh; v2 tests whether we can close the drift fully

  instead of partially. Expected wall-clock overhead ~8 min/gen (vs

  ~4 min/gen at frac=0.25).


  Ship criterion: gen 80 WR >= 74.1% (matches tb-v2 g60 peak) AND

  gen 90 WR >= 73.5%. Closes the g80->g90 gap we saw in v1.

  Kill criterion: g80/g90 WR matches reanalyse-v1 (+1-1.6pp vs tb-v2).

  More refresh didn''t help -> staleness isn''t the remaining bottleneck.

  '
