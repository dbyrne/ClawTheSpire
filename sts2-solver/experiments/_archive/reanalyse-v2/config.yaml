concluded_reason: "New combat WR baseline. Forked from tb-v2 g60 (74.1%), reached\
  \ 75.0% [73.5, 76.3] at gen 80 (n=3780, p=0.022 vs tb-v2 g80 at 72.8%). Gen 90 dropped\
  \ to 73.5%, so gen 80 is the peak. V-Eval held stable around 104 across gens 81-90\
  \ (unlike v1 which drifted). Reanalyse at frac=0.5, every 5 gens (2x v1). Some drift\
  \ remains past g80 but combat WR gain is significant \u2014 reanalyse mechanism\
  \ validated as a drift mitigator. Follow-up: v3 with more aggressive refresh to\
  \ test whether drift can be fully eliminated."
