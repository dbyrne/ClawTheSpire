concluded_reason: 'FAILED: continuous HP-delta reward (1 + delta/hp_max clamped to
  [-1,+1]) hypothesis disconfirmed. Goal was to break the value-head echo chamber
  by removing the HP=0 reward discontinuity and giving V(s) a continuous target across
  the survival boundary. After 10 gens post-fork from v3 g88, with one false-start
  fixed (initial reward formula was missing the +1 offset, causing the win-side range
  to compress to [-1,0]), the corrected experiment showed: P-Eval 98-103 (vs v3''s
  112), V-Eval recovered from 25 (broken) to 92-104 (peaked at gen 9), survival_rate
  plateaued at 40-48% (vs v3''s ~75% WR), and crucially combat_eval_mcts ECHO went
  3->11 while FIXED went 3->0 (rescue rate collapsed from v3''s 50% to 0% at gen 9).
  The reward-smoothing actively hurt search''s corrective capability. Mechanism: under
  v3''s reward, V(s) for clear wins ~+1.12 vs losses -1 gave search wide dynamic range
  to disagree with policy. Under neghp, V(s) for typical wins compressed near 0 (because
  avg combat ends at HP near 0 under self-play), so search has minimal range to argue
  against policy priors. Echo chamber WORSENED, not improved. V-Eval climbing while
  P-Eval declining + rescue rate collapsing matches the ''echo-chamber via value bias''
  signature from project_capacity_dual_null findings. Direct evidence: bottleneck
  is per-action signal granularity (Q(s,a) discrimination), not state-level signal
  granularity (V(s) smoothness). Pivots toward action/advantage head as the next test.'
