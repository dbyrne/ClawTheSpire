name: mcts-dense-low-cpuct
method: mcts_selfplay
description: 'MCTS self-play with dense value targets + reduced C_PUCT (1.5 vs 2.5).
  Lower exploration constant trusts backed-up Q values over policy prior, allowing
  MCTS to discover better actions even when the policy prior is wrong.'
