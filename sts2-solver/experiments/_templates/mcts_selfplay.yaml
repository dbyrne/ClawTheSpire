name: mcts-selfplay
method: mcts_selfplay
description: "MCTS self-play training"

training:
  generations: 3000
  combats_per_gen: 256
  lr: 0.0003
  batch_size: 512
  mcts:
    num_sims: 400
    temperature: 1.0
    replay_capacity: 200000
    train_epochs: 4
    value_coef: 1.0

data:
  mode: mixed
  recorded_frac: 0.5

curriculum:
  start_tier: 0
  skip_to_final: false

checkpoints:
  save_every: 10
  keep_best: true
  cold_start: false
