name: mcts-selfplay
method: mcts_selfplay
description: "MCTS self-play training"

training:
  generations: 3000
  combats_per_gen: 256
  lr: 0.0003
  batch_size: 512
  mcts:
    num_sims: 400
    temperature: 1.0
    replay_capacity: 200000
    train_epochs: 4
    value_coef: 1.0

data:
  mode: encounter_set
  encounter_set: lean-decks-v1

checkpoints:
  save_every: 10
  keep_best: true
  cold_start: false
