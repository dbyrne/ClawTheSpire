name: ppo
method: ppo
description: "PPO training"

training:
  generations: 2000
  combats_per_gen: 256
  lr: 0.0003
  ppo:
    gamma: 0.99
    lam: 0.95
    temperature_start: 1.0
    temperature_end: 0.5
    entropy_coef: 0.03
    clip_ratio: 0.2
    value_coef: 0.5
    max_grad_norm: 0.5
    ppo_epochs: 4
    ppo_batch_size: 256

data:
  mode: encounter_set
  encounter_set: lean-decks-v1

checkpoints:
  save_every: 50
  keep_best: true
