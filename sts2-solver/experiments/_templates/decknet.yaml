name: decknet-phase0
method: decknet_selfplay
network_type: decknet
description: "DeckNet Phase 0 — card-reward decisions via V-over-deck, other non-combat decisions random"

training:
  generations: 10
  runs_per_gen: 100
  lr: 0.0003
  batch_size: 256
  decknet:
    mcts_sims: 200
    temperature: 1.0
    combat_replays: 1
    train_steps_per_gen: 50
    option_epsilon: 0.15
    replay_capacity: 50000
    # Path to a trained BetaOne checkpoint whose card embeddings DeckNet
    # inherits frozen. Change per-experiment as BetaOne evolves.
    betaone_checkpoint: "experiments/mcts-bootstrap-pwfix1000/betaone_latest.pt"

# DeckNet trains on full runs, not a pre-frozen encounter set.
# The Rust simulator generates run trajectories on the fly.
data:
  mode: full_run

checkpoints:
  save_every: 5
  keep_best: false
  cold_start: false
