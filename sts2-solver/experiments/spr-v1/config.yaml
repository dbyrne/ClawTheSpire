name: spr-v1
method: mcts_selfplay
description: |
  Self-Predictive Representation (SPR) auxiliary loss to close the
  policy-only vs MCTS teacher-student gap.

  Motivation (binary suite benchmarks, 2026-04-21):
  - v3 g88 policy-only: 55.7% WR
  - v3 g88 MCTS-1000: 73.5% WR (+17.8pp MCTS lift)
  - Policy head captures only visit distribution from MCTS; the trunk
    lacks planning-aware features. Adding an auxiliary dynamics head
    that predicts next-state trunk features from MCTS π forces the
    trunk to encode "what happens if I take this action" info —
    which the policy+value heads then read for free via the shared
    trunk.

  Architecture changes (vs v3 g88 baseline):
  - Added DynamicsHead: (trunk_h + policy) → predicted next_trunk_h.
    Small 2-layer MLP (~20K params).
  - No inference-time change. DynamicsHead only used during training
    to regularize the trunk.

  Training loss:
    L = L_policy + value_coef * L_value + spr_coef * L_spr
    L_spr = MSE(D(h, π), stop_gradient(trunk(next_state)))
  Terminal steps masked out (no next state).

  Fork point: reanalyse-v3 g88. Same training config otherwise:
  reanalyse frac=0.75 every=2, mcts_bootstrap, q_target_mix=0.5, vhl=3.

  Ship criterion (10-gen mean on lean-decks-v1):
  - Policy-only benchmark WR >= 60% (vs v3's 55.7%, +4.3pp)
  - MCTS-1000 benchmark WR >= 76% (vs v3's 73.5%, +2.5pp)
  - P-Eval/V-Eval: no regression beyond noise.

  Kill criterion:
  - Policy-only <= 55% (SPR not doing anything distinctive)
  - MCTS-1000 < 71% (SPR actively harmful)

  Compute cost: trunk forward doubles (current + next state), adds
  ~20% per-gen time. Expect ~18 min/gen, ~30 hours for 100 gens.
