name: encoder-v2-cpuct3-qmix025
method: mcts_selfplay
description: "Encoder v3 (arch_version 3) + 10x capacity bump, cold-start.\n\nEncoder\
  \ changes (vs v3):\n- +3 turn-counter dims (cards_played, attacks_played, _skills_played)\n\
  - +18 potion-inventory dims (3 slots \xD7 6 fields)\n- +3 new pile ID tensor inputs\
  \ (draw[30], discard[30], exhaust[20])\n  embedded + mean-pooled, concatenated to\
  \ trunk input\n- state_dim 446 -> 467, trunk_input 188 -> 561\n\nCapacity (vs v3\
  \ 140K):\n- card_embed_dim 16 -> 64 (leverage: now used across hand/action/3 piles)\n\
  - hand_proj_dim 32 -> 192\n- trunk 2x128 -> 4x768\n- policy_head_type dot_product\
  \ -> mlp (hidden 512)\n- Estimated 3.1M params, ~10x v3\n\nTraining recipe: identical\
  \ to reanalyse-v3 (proven baseline).\nOnly deltas: lr 3e-4 -> 1e-4 (bigger model\
  \ sensitivity),\nreanalyse_min_gen 10 -> 30 (cold-start, needs more gens\nbefore\
  \ the network produces meaningful MCTS labels).\n\nHypothesis: v3's ceiling (P-Eval\
  \ ~115, policy-only WR ~48%)\nwas representational, not capacity or algorithm. Richer\
  \ encoder\n+ capacity unlocks scaling. If false (P-Eval <= 95 at gen 20),\nthe ceiling\
  \ is elsewhere and we stop spending on this axis.\n\nShip @ gen 50: P-Eval > 130\
  \ OR V-Eval > 120.\nKill @ gen 20: P-Eval <= 95 (within v3's noise band).\n"
