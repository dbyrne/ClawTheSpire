name: pomcp-valuedepth-v1
method: mcts_selfplay
description: 'Value-head depth experiment. Cold-restart fork of pwfix1000 with value_head_layers=3
  (4-layer MLP, ~50K value-head params vs legacy 8K). All other config identical to
  pwfix1000 (POMCP on, 1000 sims, c_puct=1.5, pw_k=1.0, mcts_bootstrap=true, turn_boundary_eval=true,
  dense_value_targets=true). Tests whether compound/conditional/arithmetic failures
  in value eval are a value-head capacity bottleneck. Baseline to beat: pwfix1000
  @ 98/117 (future_value 19/22, arithmetic 15/24). Eval every 10 gens; kill if value
  eval < 100/117 at gen 30.'
