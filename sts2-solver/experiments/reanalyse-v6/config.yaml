name: reanalyse-v6
method: mcts_selfplay
description: |
  v3's config on lean-decks-v2 (distribution-enrichment experiment).

  Same training config as reanalyse-v3 (frac=0.75, every=2, vhl=3,
  mcts_bootstrap, q_target_mix=0.5). Only change: trains on
  lean-decks-v2 (238 encounters, HP x0.81, +D&R/WF/Accelerant gap
  fillers) instead of lean-decks-v1.

  Motivation (2026-04-21 v3 g88 BAD analysis):
  - v3's 15 BAD P-Eval scenarios cluster in:
    * Accelerant under-valuation (4 scenarios)
    * Target-index-0 bias (5 scenarios, targeting+lethal+poison routing)
    * Lethal recognition (2 scenarios)
    * Power-early sequencing (3 scenarios)
    * Distribution gap: DODGE_AND_ROLL at 0.5% (1 scenario)
  - lean-decks-v2 directly addresses the distribution gaps:
    * DODGE_AND_ROLL 0.5% -> 9.7% (20x exposure bump)
    * WRAITH_FORM 3.7% -> 9.2%
    * +14 ACCELERANT+DEADLY_POISON decks (engineered decision states)
  - HP x0.81 across all encounters adds ~5pp WR pressure per gen,
    giving skill-margin signals more room to appear.

  Fork point: reanalyse-v3 g88 (strongest combat net, vhl=3). Warm-start
  preserves v3's trained weights; only the data distribution changes.

  Ship criterion: beats v3 g88 on >= 2 of:
  - P-Eval > 112/127
  - V-Eval > 100/121 (match v3 mean)
  - MCTS CLEAN > 104 on binary suite
  - Specifically: DODGE_AND_ROLL and ACCELERANT scenarios move from
    BAD -> CLEAN (the hypothesis-driven metrics)

  Kill criterion:
  - P-Eval drops below 108 sustained for 10 gens (training data
    distribution shift destroying v3's existing quality)
  - OR MCTS CLEAN drops below 95 (v3 - 9)

  Compute cost: same as v3 (~16 min/gen, ~27 hours for 100 gens).
created: '2026-04-21T23:13:14+00:00'
