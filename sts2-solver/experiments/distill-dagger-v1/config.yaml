name: distill-dagger-v1
method: distill_c51_dagger
description: 'DAgger-style distillation: states generated by distill-c51-diverse-v1
  self-play (temp=1.5, noise=0.5, MCTS-1000) on uber-decks-v1, labeled by v3 g88 +
  MCTS-2000 via betaone_mcts_reanalyse. 48,650 states. Tests whether training on student-visited
  states with teacher labels (distribution-shift fix) breaks the 56% policy-only /
  68% MCTS WR ceiling that all supervised variants hit.'
network_type: betaone
architecture:
  arch_version: 2
  base_state_dim: 156
  hidden_dim: 128
  action_hidden: 64
  hand_proj_dim: 32
  card_embed_dim: 16
  card_stats_dim: 28
  relic_dim: 27
  hand_agg_dim: 3
  action_dim: 35
  max_hand: 10
  max_actions: 30
  value_head_layers: 3
  trunk_layers: 2
  trunk_hidden: 128
  policy_head_type: dot_product
  policy_mlp_hidden: 64
  use_distributional_value: true
  c51_atoms: 51
  c51_v_min: -1.2
  c51_v_max: 1.5
  num_cards: 578
  total_params: 144011
  state_dim: 446
  trunk_input: 188
training:
  epochs: 100
  lr: 0.0003
  batch_size: 512
  lr_schedule: cosine_warmup
data:
  mode: dagger
  sampler: distill-c51-diverse-v1
  teacher: reanalyse-v3 g88
  dataset: distill-dagger-v1/dataset.pkl
  encounter_set: uber-decks-v1
  n_states: 48650
  n_combats: 2000
  sampler_sims: 1000
  teacher_sims: 2000
checkpoints:
  save_every: 10
  cold_start: true
