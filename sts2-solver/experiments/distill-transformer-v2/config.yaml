concluded_reason: "Transformer (517K params) + uber-decks-v1 diverse dataset distillation.\
  \ Killed at epoch 68/200 after 40 epochs showed consistent negative rescue rate.\
  \ P-Eval peaked at 108 (e62) but within noise (mean 101, std 3). V-Eval peaked at\
  \ 103. Val c51 loss still declining (1.75 at e40 -> 1.60 at e68, vs transformer-v1\
  \ final 1.39) \u2014 value head undertrained when killed. Key finding: transformer\
  \ + diverse combination produces -10 to -20% MCTS rescue consistently (40 eval points,\
  \ never positive), while diverse-v1 non-transformer had +19% and transformer-v1\
  \ on lean-decks had +15%. The arch+data combo overfits training distribution \u2014\
  \ value head 'confidently wrong' on unseen states, breaking more MCTS picks than\
  \ rescuing. Redirected compute to DAgger (task bku3l1t3q) which addresses distribution-shift\
  \ root cause directly."
