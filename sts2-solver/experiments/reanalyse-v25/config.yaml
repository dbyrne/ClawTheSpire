name: reanalyse-v25
method: mcts_selfplay
description: |
  reanalyse midpoint config: frac=0.75, every=3 (between v2 and v3).

  Multi-gen V-Eval (last 10 gens, binary suite, 2026-04-21):
    v1 mean 95.4, v2 mean 104.6, v3 mean 100.3
  Multi-gen P-Eval snapshot (binary suite):
    v1 102, v2 99, v3 112

  v2 has best V-Eval; v3 has best P-Eval. Hypothesis: v3's aggressive
  refresh (every=2, 37.5%/gen) perturbs V-head targets faster than V
  can stabilize. Midpoint (every=3, frac=0.75, 25%/gen) keeps cadence
  as the primary lever (per project_reanalyse_v3_ship) but relaxes
  churn.

  Fork point: tb-v2 g60 (same parent as v1/v2/v3 for clean comparison).

  Ship criterion: V-Eval 10-gen mean >= 103 (near v2) AND P-Eval 10-gen
  mean >= 108 (near v3).
  Kill criterion: V-Eval mean < 100 (worse than v3) OR P-Eval mean < 103
  (worse than v2).

  Compute cost: 25%/gen refresh = 12.5K states/gen vs v3's 18.75K.
  Expect ~11 min/gen, ~18 hours for 100 gens (vs v3's 27 hours).
