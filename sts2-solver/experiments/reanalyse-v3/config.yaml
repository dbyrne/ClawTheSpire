name: reanalyse-v3
method: mcts_selfplay
description: |
  MuZero-style reanalyse at maximum frac for cadence=5: every 5 gens,
  refresh the FULL buffer (frac=1.0) with current network MCTS.

  v1 ran frac=0.25 / every=5 (5%/gen refresh rate) — drift partially
  mitigated. v2 ran frac=0.5 / every=5 (10%/gen) — drift halved vs tb-v2
  but g80->g90 drop of 1.5pp showed staleness still leaks. v3 at
  frac=1.0 / every=5 (20%/gen, every buffer entry refreshed exactly once
  per 5 gens, max staleness = 5 gens) tests the theoretical ceiling of
  pure reanalyse at current cadence.

  Fork point: tb-v2 g60, same as v1/v2 (apples-to-apples). Merged main
  in first so v3 trains against the fixed simulator (Dodge/Roll etc.)
  and can eval against the expanded 128-scenario suite. This means
  v3's absolute WR won't be directly comparable to v1/v2's (different
  engine), but v3's internal drift trajectory (does g80 WR hold through
  g90?) is still a clean test.

  Ship criterion: g80 AND g90 both >= 74.1% (tb-v2 g60 peak). If true,
  staleness WAS the dominant drift mechanism and frac=1.0 fully closes
  it.
  Kill criterion: g90 drifts from g80 peak by >=1pp despite frac=1.0.
  Staleness alone isn't the bottleneck; need a different intervention
  axis (value-head bias via ucb-reanalyse-v1 or similar).
